<!-- Live Clock Script --> 
<script>
    function updateClock() {
        const now = new Date();
        
        const options = { 
            year: 'numeric', 
            month: 'numeric', 
            day: 'numeric', 
            hour: '2-digit', 
            minute: '2-digit', 
            second: '2-digit', 
            hour12: true 
        };
        
        // Formats time perfectly (e.g., 10 July 2026, 05:37:15 PM)
        const formattedTime = now.toLocaleString('en-IN', options);
        
        // Updates the HTML element
        document.getElementById('live-clock').innerHTML = `<i class="fa-regular  style="color: var(--gov-accent); margin-right: 6px;"></i> ${formattedTime}`;
    }

    // Refresh clock every 1 second
    setInterval(updateClock, 1000);
    
    // Initial call to load immediately
    updateClock();
</script>
