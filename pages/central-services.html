    <!-- CSS Links (The ../ to go up one folder) -->

    <link rel="stylesheet" href="../css/footer.css">
    
    <!-- CSS file  -->
    <link rel="stylesheet" href="../css/central-services.css">
</head>
<body>

    <!-- Main Navigation (Reused from your home page) -->
     <header class="navbar-container">
        
        <!-- Top Utility Bar -->
        <div class="top-bar">
            <span>
                <i class="fa-solid fa-flag"></i>
                Government Resources Portal
            </span>


        </div>

        <!-- Main Navigation -->
        <nav class="navbar">

            <!-- Logo -->
       <div class="logo">
    <!-- Clean, Sharp & Solid Dark Tricolor Landmark Logo -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 85" width="50" height="50" style="margin-right: 12px; display: inline-block; vertical-align: middle;">
        <!-- Roof (Premium Dark Saffron) -->
        <polygon points="50,5 98,32 2,32" fill="#C65A00" rx="2" />
        
        <!-- Top Beam (Solid Light Cream/White for contrast) -->
        <rect x="8" y="35" width="84" height="6" fill="#F4F4F6" rx="1" />
        
        <!-- Pillars (Solid Crisp White with Subtle Inner Shadows/Borders) -->
        <g fill="#FFFFFF" stroke="#D1D5DB" stroke-width="0.7">
            <rect x="14" y="44" width="10" height="24" rx="1" />
            <rect x="34" y="44" width="10" height="24" rx="1" />
            <rect x="54" y="44" width="10" height="24" rx="1" />
            <rect x="74" y="44" width="10" height="24" rx="1" />
        </g>
        
        <!-- Ashoka Chakra (Deep Royal Navy Blue - Sharp Details) -->
        <circle cx="49" cy="56" r="8" stroke="#001833" stroke-width="1.5" fill="none" />
        <path d="M49,48 L49,64 M41,56 L57,56 M43,50 L55,62 M43,62 L55,50" stroke="#001833" stroke-width="0.8" />
        
        <!-- Base (Premium Dark Green) -->
        <rect x="2" y="71" width="96" height="9" rx="3" fill="#0B5304" />
    </svg>

    <!-- Text (Matching Deep Royal Navy Blue) -->
    <span style="color: #001833; font-size: 22px; font-family: sans-serif; display: inline-block; vertical-align: middle;">
        Government<strong style="font-weight: 800;">Portal</strong>
    </span>
</div>
 <!-- the logo code end -->
            <!-- Navigation Links -->
<ul class="nav-links" id="navLinks">

    <li>
        <a href="index.html" class="active">
            <i class="fa-solid fa-house"></i> Home
        </a>
    </li>

    <li>
        <a href="central-services.html">
            <i class="fa-solid fa-building-columns"></i>

            <i class="fa-solid fa-layer-group"></i>

            <i class="fa-solid fa-circle-info"></i>

            <i class="fa-solid fa-right-to-bracket"></i>

</ul>

            <!-- Hamburger -->
            <div class="hamburger" id="hamburger">
                <i class="fa-solid fa-bars"></i>
            </div>

        </nav>

    </header>

    <!-- Main Content Area -->
    <main class="page-content">
        <div class="page-header">
            <!-- New Logo Container -->
        <div class="gov-logo-container">
            <img src="../assets/images/central-government.webp" alt="Government Emblem" class="gov-logo">
        </div>
            <h1>Central Government Services</h1>
            <p>Browse and apply for nationwide official services.</p>
            
            <!-- Search & Filter Wrapper -->
        <div class="search-filter-wrapper">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="service-search" placeholder="Search Central Services...">
                <i class="fa-solid fa-xmark clear-icon" id="clear-search" style="display: none;"></i>
            </div>
            
            <!-- New Filter Button -->
            <button id="open-filter-btn" class="filter-btn" title="Filter by Category">
                <i class="fa-solid fa-sliders"></i>
            </button>
        </div>

        <!-- Results counter stays here -->
        <div id="results-counter" class="results-counter"></div>

        <!-- THIS IS THE MAGIC CONTAINER -->
        <!-- Our JavaScript will loop through your JSON and put the cards in here -->
        <div class="services-grid" id="services-grid">
            <!-- Data will load here automatically -->
        </div>
        <!-- The Filter Pop-up Modal -->
        <div id="filter-modal" class="modal">
            <div class="modal-content filter-modal-content">
                <span class="close-btn" id="close-filter-btn">&times;</span>
                <h2 class="modal-title"><i class="fa-solid fa-filter" style="color:#1565ff; margin-right:10px;"></i> Filter Categories</h2>
                
                <div class="filter-options" id="filter-options-container">
                    <!-- JavaScript will auto-generate checkboxes here -->
                </div>
                
                <div class="filter-actions">
                    <button id="clear-filters-btn" class="btn-details">Clear All</button>
                    <button id="apply-filters-btn" class="btn-official">Apply Filters</button>
                </div>
            </div>
        </div>
        <!-- The Pop-up Modal (Hidden by default) -->
        <div id="service-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <div id="modal-body">
                    <!-- JavaScript will inject the details here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Footer (Reused from your home page) -->
    <footer class="gov-footer">
        <div class="footer-bottom">
            <div class="footer-container bottom-flex">
               <p style="text-align: center;">&copy; 2026 Govt. of India. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Scroll to top button -->
<button id="scrollToTop" title="Go to top">
    <i class="fa-solid fa-arrow-up"></i>
</button>

    <!-- JavaScript files -->
    <script src="../js/home.js"></script>
    <!-- JavaScript file-->
    <script src="../js/central-services.js"></script>
