<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Local Services Locator - GovHub</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="css/state-style.css">
</head>
<body>

  <section class="state-services-panel">
    
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #0056b3; padding-bottom: 12px; margin-bottom: 15px;">
      <h3 style="border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
        <i class="fa-solid fa-map-location-dot"></i> SMART HYPER-LOCAL SERVICES LOCATOR
      </h3>
      
      <a href="index.html" class="top-back-btn" style="background-color: #0056b3; color: white; text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px;">
        <i class="fa-solid fa-house"></i> Home Dashboard
      </a>
    </div>

    <p class="subtitle" style="font-size: 13px; color: #666; margin-top: 5px; margin-bottom: 25px;">Select your location to find local DM office, Municipal Corporation, Police Stations & Local Schemes.</p>

    <div class="filter-form-container">
      
      <div class="form-group">
        <label><i class="fa-solid fa-flag"></i> 1. Select State:</label>
        <select id="stateSelect" onchange="loadDistricts()">
          <option value="">-- Select State --</option>
          <option value="bihar">Bihar (बिहार)</option>
          <option value="up">Uttar Pradesh (उत्तर प्रदेश)</option>
          <option value="jharkhand">Jharkhand (झारखंड)</option>
        </select>
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-city"></i> 2. Select District:</label>
        <select id="districtSelect" disabled>
          <option value="">-- First Select State --</option>
        </select>
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-list-check"></i> 3. Service Need:</label>
        <select id="serviceTypeSelect">
          <option value="">-- Select Category --</option>
          <option value="administration">Local Administration (DM/Tehsil/Police)</option>
          <option value="certificates">Certificates & Identity (आय/जाति/निवास)</option>
          <option value="municipal">Municipal & Utilities (नगर निगम/टैक्स)</option>
          <option value="health">Local Healthcare & Emergency</option>
        </select>
      </div>

      <div class="form-group form-group-btn">
        <button class="btn-search" onclick="filterLocalServices()">
          <i class="fa-solid fa-magnifying-glass"></i> Find Local Services
        </button>
      </div>

    </div>

    <div id="stateServicesGrid" class="grid-container">
      <p class="initial-msg">Select your State, District and Category to fetch local office direct links and helplines.</p>
    </div>

    <div class="back-container" style="text-align: center; margin-top: 30px;">
      <a href="index.html" class="back-link" style="text-decoration: none; color: #0056b3; font-weight: 600; font-size: 14px;"><i class="fa-solid fa-arrow-left"></i> Back to Main Dashboard</a>
    </div>
  </section>

  <script src="js/database.js"></script>
  <script src="js/state-app.js"></script>
</body>
</html>
